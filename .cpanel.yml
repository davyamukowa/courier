---
# cPanel Git Version Control deployment file.
# When you click "Deploy HEAD Commit" (or a deploy is triggered via cron/webhook),
# cPanel runs these commands from the repository's working copy.
#
# IMPORTANT: replace /home/CPANELUSER and the live path below with your real
# cPanel username and the actual path to perfex_crm on the live server.
deployment:
  tasks:
    - export DEPLOYPATH=/home/d19346/public_html/
    - for d in modules/*/; do m=$(basename "$d"); mkdir -p "$DEPLOYPATH/modules/$m"; /bin/cp -R "$d." "$DEPLOYPATH/modules/$m/"; done
